name: Veille IA — Mise à jour hebdomadaire

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  update-veille-ia:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic requests beautifulsoup4

      - name: Lancer la veille IA
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: "Veille IA Pédagogique <${{ secrets.SMTP_USER }}>"
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python3 veille_ia_updater.py

      - name: Sauvegarder news.json dans GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🗞 Mise à jour automatique veille IA'
          file_pattern: news.json

      - name: Déployer tous les fichiers sur le serveur via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /consultant-web-formation.fr/IA/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            veille_ia_updater.py
            README.md
